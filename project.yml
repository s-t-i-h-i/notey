name: Notey
options:
  bundleIdPrefix: com.adrian
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
schemes:
  Notey:
    build:
      targets:
        Notey: all
        NoteyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NoteyUITests
targets:
  Notey:
    type: application
    platform: iOS
    sources:
      - Notey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrian.notey
        # iPad-only app
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_FILE: Notey/Info.plist
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
  # Simulator driver for the pencil-free ink pipeline (dev finger-drawing
  # mode): synthesizes draw-and-hold touches that a plain unit test cannot.
  NoteyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NoteyUITests
    dependencies:
      - target: Notey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adrian.notey.uitests
        TEST_TARGET_NAME: Notey
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "2"
